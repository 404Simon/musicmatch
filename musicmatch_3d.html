  for (let i = 0; i < n; i++) {
    const match = filepaths[i].toLowerCase().includes(q);

    if (marked[i]) {
      colors.push('#FFD700');
      sizes.push(10);
      opacities.push(1.0);
      lineWidths.push(1.5);
      markedCount++;
      if (!q || match) matchCount++;
    } else if (!q || match) {
      colors.push(groupColors[i]);
      sizes.push(4);
      opacities.push(0.85);
      lineWidths.push(0);
      matchCount++;
    } else {
      colors.push('#444');
      sizes.push(1.5);
      opacities.push(0.06);
      lineWidths.push(0);
    }
  }

  Plotly.restyle('plot', {
    'marker.color': [colors],
    'marker.size': [sizes],
    'marker.opacity': [opacities],
    'marker.line.width': [lineWidths],
    'marker.line.color': ['#FFD700'],
  });

  document.getElementById('marked-count').textContent = markedCount;
  document.getElementById('match-count').textContent = matchCount;
}

const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  updatePlot();
});

document.getElementById('reset').addEventListener('click', () => {
  marked = new Array(n).fill(false);
  searchQuery = '';
  searchInput.value = '';
  updatePlot();
});

const plotDiv = document.getElementById('plot');
Plotly.on(plotDiv, 'plotly_click', (data) => {
  if (!data.points || data.points.length === 0) return;
  const idx = data.points[0].pointNumber;
  marked[idx] = !marked[idx];
  updatePlot();
});
</script>
</body>
</html>
