<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicMatch 3D</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden
}
.controls{
  display:flex;align-items:center;gap:12px;padding:12px 20px;
  background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0
}
#search{
  flex:1;max-width:420px;padding:8px 14px;border:1px solid #0f3460;
  border-radius:6px;background:#1a1a2e;color:#e0e0e0;font-size:14px;
  outline:none;transition:border-color .2s
}
#search:focus{border-color:#e94560}
#search::placeholder{color:#555}
.btn{
  padding:8px 16px;border:none;border-radius:6px;background:#e94560;
  color:#fff;cursor:pointer;font-size:13px;transition:opacity .2s;white-space:nowrap
}
.btn:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid #555;color:#aaa}
.btn-outline:hover{border-color:#e94560;color:#e94560}
.stats{margin-left:auto;font-size:13px;color:#666}
.stats em{font-style:normal;color:#e0e0e0;font-weight:600}
.info-bar{
  text-align:center;font-size:12px;color:#555;padding:4px;
  background:#16213e;border-top:1px solid #0f3460;flex-shrink:0
}
#plot{flex:1}
</style>
</head>
<body>

<div class="controls">
  <input id="search" type="text" placeholder="Search songs by path..." autofocus>
  <button class="btn" id="reset">Reset</button>
  <div class="stats">
    <em id="marked-count">0</em> marked ·
    <em id="match-count">{{ filepaths | length }}</em> / <em id="total-count">{{ filepaths | length }}</em> songs
  </div>
</div>

<div id="plot"></div>

<div class="info-bar">Click a point to toggle mark &middot; Type to search paths &middot; Drag to orbit</div>

<script>
const plotJson = {{ plot_json | safe }};
const filepaths = {{ filepaths | tojson }};
const groupColors = {{ colors | tojson }};

const n = filepaths.length;
let marked = new Array(n).fill(false);
let searchQuery = '';

const fig = plotJson;
const trace = fig.data[0];
trace.marker.line = { width: 0, color: '#FFD700' };

const layout = Object.assign(fig.layout, {
  paper_bgcolor: '#1a1a2e',
  plot_bgcolor: '#1a1a2e',
  scene: Object.assign(fig.layout.scene || {}, { bgcolor: '#1a1a2e' }),
  margin: { l: 0, r: 0, b: 0, t: 0 },
});

Plotly.newPlot('plot', [trace], layout, {
  responsive: true,
  displayModeBar: true,
  modeBarButtonsToRemove: ['sendDataToCloud', 'lasso2d', 'select2d'],
});

function updatePlot() {
  const colors = [];
  const sizes = [];
  const opacities = [];
  const lineWidths = [];
  let markedCount = 0;
  let matchCount = 0;
  const q = searchQuery.toLowerCase();

  for (let i = 0; i < n; i++) {
    const match = filepaths[i].toLowerCase().includes(q);

    if (marked[i]) {
      colors.push('#FFD700');
      sizes.push(10);
      opacities.push(1.0);
      lineWidths.push(1.5);
      markedCount++;
      if (!q || match) matchCount++;
    } else if (!q || match) {
      colors.push(groupColors[i]);
      sizes.push(4);
      opacities.push(0.85);
      lineWidths.push(0);
      matchCount++;
    } else {
      colors.push('#444');
      sizes.push(1.5);
      opacities.push(0.06);
      lineWidths.push(0);
    }
  }

  Plotly.restyle('plot', {
    'marker.color': [colors],
    'marker.size': [sizes],
    'marker.opacity': [opacities],
    'marker.line.width': [lineWidths],
    'marker.line.color': ['#FFD700'],
  });

  document.getElementById('marked-count').textContent = markedCount;
  document.getElementById('match-count').textContent = matchCount;
}

const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  updatePlot();
});

document.getElementById('reset').addEventListener('click', () => {
  marked = new Array(n).fill(false);
  searchQuery = '';
  searchInput.value = '';
  updatePlot();
});

const plotDiv = document.getElementById('plot');
Plotly.on(plotDiv, 'plotly_click', (data) => {
  if (!data.points || data.points.length === 0) return;
  const idx = data.points[0].pointNumber;
  marked[idx] = !marked[idx];
  updatePlot();
});
</script>
</body>
</html>
